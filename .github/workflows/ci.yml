name: iMOS CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: TypeScript · Build · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Mission integrity tests
        run: pnpm run test:missions

      - name: Migration compatibility tests
        run: pnpm run test:migration

      - name: Recovery and crypto tests
        run: pnpm run test:recovery

      - name: Security boundary checks
        run: pnpm run test:security-boundaries

      - name: Synthetic performance baseline
        run: pnpm run test:performance

      - name: Production build
        run: pnpm run build

      - name: Confirm no build failures
        run: |
          if [ ! -f dist/index.html ]; then
            echo "Build output missing" && exit 1
          fi
          echo "Build verified"
