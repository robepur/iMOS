name: iMOS CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: TypeScript · Build · Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc -b --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Mission integrity tests
        run: pnpm run test:missions

      - name: Migration compatibility tests
        run: pnpm run test:migration

      - name: Recovery and crypto tests
        run: pnpm run test:recovery

      - name: Security boundary checks
        run: pnpm run test:security-boundaries

      - name: Synthetic performance baseline
        run: pnpm run test:performance

      - name: Production build
        run: pnpm run build

      - name: Confirm no build failures
        run: |
          if [ ! -f dist/index.html ]; then
            echo "Build output missing" && exit 1
          fi
          echo "Build verified"
